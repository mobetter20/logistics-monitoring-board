<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logistics Monitoring Board</title>
  <style>
    :root {
      --bg: #f6f3eb;
      --panel: #fffdf8;
      --ink: #1c1a17;
      --muted: #6a6359;
      --line: #ddd4c7;
      --alert: #af2d1f;
      --watch: #b06a00;
      --soft: #6b7280;
      --accent: #0f5d5e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
      background: linear-gradient(180deg, #f1ebdf 0%, var(--bg) 45%, #f9f7f2 100%);
      color: var(--ink);
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }
    .hero {
      padding: 24px;
      border: 1px solid var(--line);
      background: radial-gradient(circle at top right, #f3e6d1 0%, var(--panel) 42%);
      border-radius: 20px;
      margin-bottom: 24px;
    }
    .eyebrow {
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1;
    }
    .meta {
      color: var(--muted);
      font-size: 15px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
    }
    .panel {
      grid-column: span 12;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(28, 26, 23, 0.05);
    }
    @media (min-width: 880px) {
      .panel.alerts { grid-column: span 7; }
      .panel.signals { grid-column: span 5; }
      .panel.watch { grid-column: span 6; }
      .panel.community { grid-column: span 6; }
    }
    h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }
    .list {
      display: grid;
      gap: 12px;
    }
    .card {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
    }
    .card.alert { border-left: 5px solid var(--alert); }
    .card.watch { border-left: 5px solid var(--watch); }
    .card.community { border-left: 5px solid var(--soft); }
    .title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .summary {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      margin-bottom: 10px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .signal {
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }
    .signal:first-child { border-top: 0; padding-top: 0; }
    .signal-term {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: #efe8da;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">Prototype Dashboard</div>
      <h1>Logistics Monitoring Board</h1>
      <div class="meta">Last updated: <span id="last-updated"></span> | Reporting date: <span id="report-date"></span></div>
    </section>

    <section class="grid">
      <article class="panel alerts">
        <h2>Critical Alerts</h2>
        <div class="list" id="critical-alerts"></div>
      </article>

      <article class="panel signals">
        <h2>Developing Signals</h2>
        <div id="developing-signals"></div>
      </article>

      <article class="panel watch">
        <h2>Operational Watch</h2>
        <div class="list" id="operational-watch"></div>
      </article>

      <article class="panel community">
        <h2>Community Watchlist</h2>
        <div class="list" id="community-watchlist"></div>
      </article>
    </section>
  </div>

  <script>
    async function loadBoard() {
      const response = await fetch('./public-dashboard.json');
      const data = await response.json();
      document.getElementById('last-updated').textContent = data.last_updated;
      document.getElementById('report-date').textContent = data.date;

      renderCards('critical-alerts', data.critical_alerts, 'alert');
      renderCards('operational-watch', data.operational_watch, 'watch');
      renderCards('community-watchlist', data.community_watchlist, 'community');
      renderSignals(data.developing_signals);
    }

    function renderCards(targetId, items, kind) {
      const target = document.getElementById(targetId);
      if (!items.length) {
        target.innerHTML = '<div class="card ' + kind + '"><div class="summary">No items in this section right now.</div></div>';
        return;
      }
      target.innerHTML = items.map(item => `
        <div class="card ${kind}">
          <div class="title">${escapeHtml(item.title)}</div>
          <div class="summary">${escapeHtml(item.summary)}</div>
          <div class="row">
            <span class="pill">${escapeHtml(item.source)}</span>
            <span>${escapeHtml(item.confidence)}</span>
            <span>${escapeHtml(item.tier)}</span>
            <span>${escapeHtml(item.timestamp)}</span>
            <a href="${item.link}" target="_blank" rel="noopener noreferrer">Source</a>
          </div>
        </div>
      `).join('');
    }

    function renderSignals(signals) {
      const target = document.getElementById('developing-signals');
      if (!signals.length) {
        target.innerHTML = '<div class="summary">No repeated signal currently stands out.</div>';
        return;
      }
      target.innerHTML = signals.map(signal => `
        <div class="signal">
          <div class="signal-term">${escapeHtml(signal.term)}</div>
          <div class="summary">${signal.count} items, ${signal.high_trust_count} higher-trust. Examples: ${escapeHtml(signal.examples.join('; '))}</div>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    loadBoard();
  </script>
</body>
</html>
